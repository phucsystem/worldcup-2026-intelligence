# Local-dev port mappings. Compose auto-loads this file, so `docker compose up`
# keeps the same host ports as before. Prod (docker-compose.prod.yml) is run
# WITHOUT this file, so backend/postgres stay internal to the compose network.
services:
  postgres:
    ports:
      - "5432:5432"
  backend:
    ports:
      - "8000:8000"
  frontend:
    build:
      target: dev
    ports:
      - "3000:3000"
    volumes:
      # Live source for hot reload; anonymous volumes shield the container's
      # linux node_modules / .next from the host's darwin copies.
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
